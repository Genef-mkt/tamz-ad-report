<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GENEF 광고 성과 대시보드</title>

    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23FF5F1F'/%3E%3Cpath d='M 68 32 A 25.5 25.5 0 1 0 68 68 V 50 H 46' fill='none' stroke='%23FFFFFF' stroke-width='10' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"
    />
    <script>
      (function () {
        // 원하는 비밀번호를 아래 "0000" 대신 입력하세요.
        const securePassword = "0701";

        const userInput = prompt("보안을 위해 비밀번호를 입력해주세요.");

        if (userInput !== securePassword) {
          alert("비밀번호가 올바르지 않습니다. 다시 시도해주세요.");
          document.write(
            "<body style='background:#f8fafc; display:flex; justify-content:center; align-items:center; height:100vh;'><h1 style='color:#64748b; font-family:Pretendard;'>접근 권한이 없습니다.</h1></body>",
          );
          window.stop();
          throw new Error("Access Denied");
        }
      })();
    </script>

    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://npmcdn.com/flatpickr/dist/themes/airbnb.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/ko.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="sidebar">
      <div class="logo"><span>✦</span> GENEF</div>
      <div id="nav-container" style="flex: 1"></div>
    </div>

    <div class="main-content">
      <div class="header">
        <div class="title" id="page-title">대시보드 종합 요약</div>
        <div class="controls-wrapper">
          <div class="controls-top">
            <div class="date-filter">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="currentColor"
              >
                <path
                  d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10z"
                />
              </svg>
              <input type="text" id="date-range" readonly />
            </div>
            <button
              class="btn-export"
              id="btn-export"
              onclick="exportToExcel()"
            >
              <svg
                width="16"
                height="16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                viewBox="0 0 24 24"
              >
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
              </svg>
              Excel 내보내기
            </button>
          </div>
          <div class="controls-bottom">
            <button class="btn-quick-date" onclick="setQuickDate(1, this)">
              어제
            </button>
            <button class="btn-quick-date" onclick="setQuickDate(3, this)">
              3일
            </button>
            <button class="btn-quick-date" onclick="setQuickDate(7, this)">
              7일
            </button>
            <button class="btn-quick-date" onclick="setQuickDate(14, this)">
              14일
            </button>
            <button class="btn-quick-date" onclick="setQuickDate(30, this)">
              30일
            </button>
            <button class="btn-quick-date" onclick="setQuickDate(60, this)">
              60일
            </button>
            <button class="btn-quick-date" onclick="setQuickDate(90, this)">
              90일
            </button>
          </div>
        </div>
      </div>
      <div class="content-scroll" id="content-container">
        <div class="loading">데이터를 불러오는 중입니다...</div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
